name: MacVoiceCloning
options:
  bundleIdPrefix: com.dubertrand
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  Qwen3TTS:
    url: https://github.com/AtomGradient/swift-qwen3-tts
    revision: 27a5b5b2c5d55258bead2c6e851208987e1ca225
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.0.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    HEADER_SEARCH_PATHS: $(SRCROOT)/Vendor/rubberband
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  MacVoiceCloning:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Support/Info.plist"
      - path: Vendor/rubberband/single/RubberBandSingle.cpp
    dependencies:
      - package: Qwen3TTS
        product: Qwen3TTS
      - package: SwiftTransformers
        product: Hub
      - sdk: Accelerate.framework
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: App/Support/Bridging-Header.h
        PRODUCT_BUNDLE_IDENTIFIER: com.dubertrand.MacVoiceCloning
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
    info:
      path: App/Support/Info.plist
      properties:
        NSMicrophoneUsageDescription: "MacVoiceCloning records a short sample of your voice to clone it."
        NSSpeechRecognitionUsageDescription: "MacVoiceCloning transcribes your voice sample to prefill the reference text."
        LSApplicationCategoryType: public.app-category.utilities

  MacVoiceCloningTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: App/TTS
      - path: App/Audio
      - path: App/Alteration
      - path: Vendor/rubberband/single/RubberBandSingle.cpp
    dependencies:
      - package: Qwen3TTS
        product: Qwen3TTS
      - package: SwiftTransformers
        product: Hub
      - sdk: Accelerate.framework
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: App/Support/Bridging-Header.h
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MacVoiceCloning:
    build:
      targets:
        MacVoiceCloning: all
        MacVoiceCloningTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MacVoiceCloningTests
